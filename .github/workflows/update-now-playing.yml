name: Update Now Playing

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-now-playing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-now-playing.txt

      - name: Restore YouTube Music auth
        env:
          YTMUSIC_AUTH_JSON_BASE64: ${{ secrets.YTMUSIC_AUTH_JSON_BASE64 }}
        run: |
          mkdir -p .secrets
          if [ -z "$YTMUSIC_AUTH_JSON_BASE64" ]; then
            echo "YTMUSIC_AUTH_JSON_BASE64 is not set. keep existing SVG or fallback."
            exit 0
          fi
          echo "$YTMUSIC_AUTH_JSON_BASE64" | base64 --decode > .secrets/ytmusic-auth.json

      - name: Generate now playing SVG
        run: python scripts/generate-now-playing.py

      - name: Commit and push when changed
        run: |
          if git diff --quiet -- assets/now-playing.svg; then
            echo "No changes in now-playing.svg"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/now-playing.svg
          git commit -m "Update YouTube Music now playing"
          git push
