<svg width="1200" height="200" viewBox="0 0 1200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Featured Builds section banner</title>
  <desc id="desc">Blue and purple futuristic banner with subtle animated nodes and signal lines for featured builds.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.5" stop-color="#0B1226"/>
      <stop offset="1" stop-color="#140B2D"/>
    </linearGradient>
    <linearGradient id="line" x1="150" y1="40" x2="1050" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA" stop-opacity="0.12"/>
      <stop offset="0.5" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 100) rotate(90) scale(130 500)">
      <stop stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="200" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="200" rx="20" fill="url(#glow)"/>

  <path d="M110 138 C250 90 400 95 560 128 C725 161 915 160 1090 98" stroke="url(#line)" stroke-width="2"/>
  <path d="M130 72 C280 38 420 56 575 78 C780 106 930 86 1070 52" stroke="url(#line)" stroke-width="1.5"/>

  <g opacity="0.9">
    <circle cx="210" cy="118" r="4" fill="#60A5FA">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="102" r="3.5" fill="#8B5CF6">
      <animate attributeName="opacity" values="0.35;0.95;0.35" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="122" r="4" fill="#60A5FA">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="865" cy="90" r="3.5" fill="#8B5CF6">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="5.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1010" cy="112" r="4" fill="#60A5FA">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <circle cx="180" cy="138" r="2.2" fill="#93C5FD">
      <animateTransform attributeName="transform" type="translate" values="0 0;8 -6;0 0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="535" cy="76" r="2" fill="#C4B5FD">
      <animateTransform attributeName="transform" type="translate" values="0 0;-10 5;0 0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="58" r="2.2" fill="#93C5FD">
      <animateTransform attributeName="transform" type="translate" values="0 0;10 6;0 0" dur="6.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="90" y="88" fill="#E2E8F0" font-size="40" font-family="Verdana, Geneva, sans-serif" font-weight="700">Featured Builds</text>
  <text x="92" y="124" fill="#94A3B8" font-size="18" font-family="Verdana, Geneva, sans-serif">UI / API / DB / Worker / Bot / AI Native</text>
</svg>
